<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>X Article Publisher</title>
  </head>
  <body>
    <main>
      <header class="app-header">
        <div class="brand-mark" aria-hidden="true">X</div>
        <div>
          <h1>X Article Publisher</h1>
          <p class="hint">飞书到 X Articles 的发布助手</p>
        </div>
      </header>

      <div class="actions">
        <button id="openX" class="primary" type="button">打开 X Articles</button>
        <button id="checkHelper" type="button">检查 helper</button>
      </div>

      <section id="latest" hidden>
        <div class="section-label">最近草稿</div>
        <h2 id="latestTitle"></h2>
        <p id="latestMeta"></p>
      </section>

      <p id="status" aria-live="polite"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
